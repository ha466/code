<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Live2D Viewer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #3a3a3a 0%, #1a1a1a 100%); /* Radial gradient for depth */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            pointer-events: none;
            transition: opacity 0.5s;
            text-align: center;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Glassy Controls Style */
        #controls-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            pointer-events: none;
            
            /* Glassmorphism Effect */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            
            padding: 12px 24px;
            border-radius: 50px; /* Pill shape */
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.8/browser/pixi.min.js"></script>
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/index.min.js"></script>
</head>
<body>

    <div id="loading">Initializing...</div>
    
    <div id="controls-info">
        Left Click to Drag • Scroll to Zoom • Click Model to Interact
    </div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        // --- Configuration ---
        const MODEL_URL = "https://ha466.github.io/bill/modal2/iris.model3.json";

        // --- Setup ---
        window.PIXI = PIXI; 
        const { Live2DModel } = PIXI.live2d;
        let app;
        let currentModel = null;

        (async function () {
            const loadingDiv = document.getElementById('loading');

            // 1. Initialize Pixi Application
            app = new PIXI.Application({
                view: document.getElementById('canvas'),
                autoStart: true,
                resizeTo: window,
                backgroundAlpha: 0,
                antialias: true
            });

            // 2. Load Function
            async function loadModel() {
                
                loadingDiv.innerText = `Loading Iris...`;

                // Load Model
                try {
                    currentModel = await Live2DModel.from(MODEL_URL);
                } catch (error) {
                    console.error("Failed to load model:", error);
                    loadingDiv.innerText = "Error loading model. Check console.";
                    loadingDiv.style.color = "#ff6b6b";
                    return;
                }

                // Setup Model
                app.stage.addChild(currentModel);
                
                // Scale & Position
                const scaleX = (window.innerWidth * 0.4) / currentModel.width;
                const scaleY = (window.innerHeight * 0.8) / currentModel.height;
                const scale = Math.min(scaleX, scaleY);
                currentModel.scale.set(scale);
                currentModel.x = window.innerWidth / 2;
                currentModel.y = window.innerHeight / 2;
                currentModel.anchor.set(0.5, 0.5);

                // Interaction
                currentModel.interactive = true;
                currentModel.buttonMode = true;
                setupDragging(currentModel);

                loadingDiv.style.opacity = 0;
            }

            // --- DRAGGING HELPER ---
            function setupDragging(model) {
                model.on('pointerdown', (event) => {
                    model.dragging = true;
                    model._dragData = event.data;
                    model._dragOffset = {
                        x: model.x - event.data.global.x,
                        y: model.y - event.data.global.y
                    };
                    model.alpha = 0.9;
                });

                model.on('pointerup', () => {
                    model.dragging = false;
                    model.alpha = 1;
                });

                model.on('pointerupoutside', () => {
                    model.dragging = false;
                    model.alpha = 1;
                });

                model.on('pointermove', () => {
                    if (model.dragging) {
                        const newPos = model._dragData.global;
                        model.x = newPos.x + model._dragOffset.x;
                        model.y = newPos.y + model._dragOffset.y;
                    }
                });
            }

            // Global Zoom
            document.getElementById('canvas').addEventListener('wheel', (e) => {
                if (!currentModel) return;
                e.preventDefault();
                const zoomFactor = 0.001;
                const newScale = currentModel.scale.x - (e.deltaY * zoomFactor);
                if (newScale > 0.01 && newScale < 10) {
                    currentModel.scale.set(newScale);
                }
            }, { passive: false });

            window.addEventListener('resize', () => {
                if (!currentModel) return;
                app.renderer.resize(window.innerWidth, window.innerHeight);
                if (currentModel.x > window.innerWidth || currentModel.y > window.innerHeight) {
                    currentModel.x = window.innerWidth / 2;
                    currentModel.y = window.innerHeight / 2;
                }
            });

            // Start directly
            loadModel();

        })();
    </script>
</body>
</html>
